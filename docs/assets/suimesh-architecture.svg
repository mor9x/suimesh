<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SuiMesh architecture</title>
  <desc id="desc">SuiMesh separates app adapters, protocol SDK modules, transport, storage, and on-chain trace coordination.</desc>
  <rect width="1400" height="760" rx="32" fill="#081019"/>
  <text x="80" y="78" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Architecture</text>
  <text x="80" y="112" fill="#94A5B5" font-family="Inter, Arial, sans-serif" font-size="18">A small protocol core with adapters at the edges.</text>
  <g transform="translate(80 168)">
    <rect width="260" height="430" rx="24" fill="#101923" stroke="#263847"/>
    <text x="32" y="48" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Product surface</text>
    <g transform="translate(32 86)">
      <rect width="196" height="52" rx="14" fill="#172433"/>
      <text x="98" y="33" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Web / CLI</text>
      <rect y="72" width="196" height="52" rx="14" fill="#172433"/>
      <text x="98" y="105" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Wallets</text>
      <rect y="144" width="196" height="52" rx="14" fill="#172433"/>
      <text x="98" y="177" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Agent frameworks</text>
      <rect y="216" width="196" height="52" rx="14" fill="#172433"/>
      <text x="98" y="249" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Sui apps</text>
    </g>
  </g>
  <g transform="translate(420 134)">
    <rect width="560" height="498" rx="28" fill="#F8FBFD"/>
    <text x="40" y="56" fill="#101923" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">SuiMesh Protocol SDK</text>
    <text x="40" y="86" fill="#5E7182" font-family="Inter, Arial, sans-serif" font-size="16">Types, encoders, validation, policy, and trace helpers.</text>
    <g transform="translate(40 128)">
      <rect width="220" height="74" rx="16" fill="#FFFFFF" stroke="#CCD8E3"/>
      <text x="110" y="34" fill="#102030" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Protocol types</text>
      <text x="110" y="56" fill="#667887" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">events, actions, receipts</text>
      <rect x="260" width="220" height="74" rx="16" fill="#FFFFFF" stroke="#CCD8E3"/>
      <text x="370" y="34" fill="#102030" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Codec</text>
      <text x="370" y="56" fill="#667887" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">JSON envelope + BCS</text>
      <rect y="102" width="220" height="74" rx="16" fill="#FFFFFF" stroke="#CCD8E3"/>
      <text x="110" y="136" fill="#102030" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">PTB inspector</text>
      <text x="110" y="158" fill="#667887" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">extracts action facts</text>
      <rect x="260" y="102" width="220" height="74" rx="16" fill="#FFFFFF" stroke="#CCD8E3"/>
      <text x="370" y="136" fill="#102030" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Policy engine</text>
      <text x="370" y="158" fill="#667887" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">approves facts, not prose</text>
      <rect y="204" width="220" height="74" rx="16" fill="#FFFFFF" stroke="#CCD8E3"/>
      <text x="110" y="238" fill="#102030" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Trace guard</text>
      <text x="110" y="260" fill="#667887" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">anchor, claim, complete</text>
      <rect x="260" y="204" width="220" height="74" rx="16" fill="#FFFFFF" stroke="#CCD8E3"/>
      <text x="370" y="238" fill="#102030" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Adapters</text>
      <text x="370" y="260" fill="#667887" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">transport, storage, memory</text>
    </g>
    <rect x="40" y="442" width="480" height="1" fill="#DAE3EA"/>
    <text x="40" y="474" fill="#5E7182" font-family="Inter, Arial, sans-serif" font-size="15">Transport-agnostic by design. Sui Stack Messaging is one binding.</text>
  </g>
  <g transform="translate(1060 168)">
    <rect width="260" height="430" rx="24" fill="#101923" stroke="#263847"/>
    <text x="32" y="48" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Network state</text>
    <g transform="translate(32 92)">
      <rect width="196" height="76" rx="16" fill="#172433"/>
      <text x="98" y="34" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Relayer</text>
      <text x="98" y="56" fill="#91A4B4" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">encrypted delivery</text>
      <rect y="104" width="196" height="76" rx="16" fill="#172433"/>
      <text x="98" y="138" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Walrus</text>
      <text x="98" y="160" fill="#91A4B4" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">context archive</text>
      <rect y="208" width="196" height="76" rx="16" fill="#172433"/>
      <text x="98" y="242" fill="#D6E2EC" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Sui</text>
      <text x="98" y="264" fill="#91A4B4" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">trace proofs</text>
    </g>
  </g>
  <path d="M340 382H420" stroke="#5F7386" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M980 382H1060" stroke="#5F7386" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(80 660)">
    <text x="0" y="0" fill="#8EA0B0" font-family="Inter, Arial, sans-serif" font-size="16">Walrus stores encrypted context. Sui proves the trace. Seal controls access.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#5F7386"/>
    </marker>
  </defs>
</svg>
