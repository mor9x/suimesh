<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SuiMesh communication layer</title>
  <desc id="desc">Humans, agents, wallets, and Sui applications communicate through SuiMesh, with context on Walrus and proofs on Sui.</desc>
  <rect width="1200" height="520" rx="32" fill="#07111F"/>
  <rect x="64" y="64" width="1072" height="392" rx="28" fill="#0E1C2F" stroke="#21405F"/>
  <g opacity="0.9">
    <path d="M192 260 C288 152 418 144 520 248 C634 364 748 368 1008 180" stroke="#46D5B5" stroke-width="5" stroke-linecap="round"/>
    <path d="M192 316 C336 242 454 294 578 340 C722 394 862 336 1008 260" stroke="#67A9FF" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="116" y="154" width="180" height="80" rx="18" fill="#132A44" stroke="#3E668F"/>
    <text x="206" y="187" fill="#EAF4FF" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Human</text>
    <text x="206" y="214" fill="#8FB6D8" font-family="Inter, Arial, sans-serif" font-size="15" text-anchor="middle">intent + consent</text>
  </g>
  <g>
    <rect x="904" y="124" width="180" height="80" rx="18" fill="#132A44" stroke="#3E668F"/>
    <text x="994" y="157" fill="#EAF4FF" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Agent</text>
    <text x="994" y="184" fill="#8FB6D8" font-family="Inter, Arial, sans-serif" font-size="15" text-anchor="middle">proposal + report</text>
  </g>
  <g>
    <rect x="108" y="328" width="196" height="80" rx="18" fill="#132A44" stroke="#3E668F"/>
    <text x="206" y="361" fill="#EAF4FF" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Wallet</text>
    <text x="206" y="388" fill="#8FB6D8" font-family="Inter, Arial, sans-serif" font-size="15" text-anchor="middle">policy + execution</text>
  </g>
  <g>
    <rect x="904" y="328" width="180" height="80" rx="18" fill="#132A44" stroke="#3E668F"/>
    <text x="994" y="361" fill="#EAF4FF" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Sui App</text>
    <text x="994" y="388" fill="#8FB6D8" font-family="Inter, Arial, sans-serif" font-size="15" text-anchor="middle">contract state</text>
  </g>
  <g>
    <rect x="406" y="160" width="388" height="200" rx="28" fill="#102843" stroke="#46D5B5" stroke-width="2"/>
    <text x="600" y="214" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="44" text-anchor="middle" font-weight="800">SuiMesh</text>
    <text x="600" y="252" fill="#B6D6EF" font-family="Inter, Arial, sans-serif" font-size="20" text-anchor="middle">Communication layer for agents on Sui</text>
    <rect x="456" y="286" width="128" height="42" rx="21" fill="#173F5F"/>
    <text x="520" y="313" fill="#BDEEFF" font-family="Inter, Arial, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Context</text>
    <rect x="616" y="286" width="128" height="42" rx="21" fill="#173F5F"/>
    <text x="680" y="313" fill="#BDEEFF" font-family="Inter, Arial, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Action</text>
  </g>
  <g>
    <rect x="408" y="404" width="160" height="48" rx="24" fill="#0D332F" stroke="#46D5B5"/>
    <text x="488" y="434" fill="#BFFFEF" font-family="Inter, Arial, sans-serif" font-size="17" text-anchor="middle" font-weight="700">Walrus</text>
    <rect x="632" y="404" width="160" height="48" rx="24" fill="#0E2A49" stroke="#67A9FF"/>
    <text x="712" y="434" fill="#D8EAFF" font-family="Inter, Arial, sans-serif" font-size="17" text-anchor="middle" font-weight="700">Sui</text>
  </g>
  <text x="600" y="96" fill="#EAF4FF" font-family="Inter, Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="800">Own the Context. Verify the Action.</text>
</svg>
