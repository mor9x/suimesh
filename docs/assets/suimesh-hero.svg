<svg width="1400" height="640" viewBox="0 0 1400 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SuiMesh protocol overview</title>
  <desc id="desc">SuiMesh carries signed events between apps, wallets, agents, and clients while Walrus stores context and Sui proves high-impact action traces.</desc>
  <rect width="1400" height="640" rx="36" fill="#05070A"/>
  <rect x="56" y="56" width="1288" height="528" rx="32" fill="#0B1118" stroke="#1D2B39"/>
  <defs>
    <clipPath id="logoClip">
      <rect x="110" y="110" width="86" height="86" rx="22"/>
    </clipPath>
  </defs>
  <image href="suimesh-logo.png" x="110" y="110" width="86" height="86" preserveAspectRatio="xMidYMid slice" clip-path="url(#logoClip)"/>
  <rect x="110" y="110" width="86" height="86" rx="22" stroke="#243545"/>
  <text x="214" y="143" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">SuiMesh</text>
  <text x="214" y="180" fill="#9BAAB8" font-family="Inter, Arial, sans-serif" font-size="18">Agent Action Communication Protocol on Sui</text>
  <text x="110" y="274" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800">Own the Context.</text>
  <text x="110" y="338" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800">Verify the Action.</text>
  <text x="110" y="396" fill="#A8B6C4" font-family="Inter, Arial, sans-serif" font-size="22">Conversations, proposals, policy decisions,</text>
  <text x="110" y="428" fill="#A8B6C4" font-family="Inter, Arial, sans-serif" font-size="22">receipts, memory, and audit trails as state.</text>
  <g transform="translate(110 486)">
    <rect width="160" height="48" rx="24" fill="#111A24" stroke="#2B4052"/>
    <text x="80" y="31" fill="#DDE8F1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Protocol SDK</text>
    <rect x="176" width="174" height="48" rx="24" fill="#111A24" stroke="#2B4052"/>
    <text x="263" y="31" fill="#DDE8F1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Sui PTB Actions</text>
    <rect x="366" width="144" height="48" rx="24" fill="#111A24" stroke="#2B4052"/>
    <text x="438" y="31" fill="#DDE8F1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Walrus</text>
    <rect x="526" width="116" height="48" rx="24" fill="#111A24" stroke="#2B4052"/>
    <text x="584" y="31" fill="#DDE8F1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Sui</text>
  </g>
  <g transform="translate(812 116)">
    <rect width="420" height="386" rx="26" fill="#0F1720" stroke="#253648"/>
    <text x="38" y="54" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Trace timeline</text>
    <text x="38" y="82" fill="#8DA1B4" font-family="Inter, Arial, sans-serif" font-size="15">One workflow, portable across clients</text>
    <g transform="translate(38 122)">
      <circle cx="12" cy="12" r="12" fill="#FFFFFF"/>
      <rect x="44" y="0" width="276" height="24" rx="12" fill="#162231"/>
      <text x="58" y="17" fill="#CAD8E5" font-family="Inter, Arial, sans-serif" font-size="13">UserMessage</text>
      <path d="M12 24V62" stroke="#34485D" stroke-width="2"/>
    </g>
    <g transform="translate(38 184)">
      <circle cx="12" cy="12" r="12" fill="#FFFFFF"/>
      <rect x="44" y="0" width="306" height="24" rx="12" fill="#162231"/>
      <text x="58" y="17" fill="#CAD8E5" font-family="Inter, Arial, sans-serif" font-size="13">Proposal + SuiPtbAction</text>
      <path d="M12 24V62" stroke="#34485D" stroke-width="2"/>
    </g>
    <g transform="translate(38 246)">
      <circle cx="12" cy="12" r="12" fill="#FFFFFF"/>
      <rect x="44" y="0" width="254" height="24" rx="12" fill="#162231"/>
      <text x="58" y="17" fill="#CAD8E5" font-family="Inter, Arial, sans-serif" font-size="13">PolicyDecision</text>
      <path d="M12 24V62" stroke="#34485D" stroke-width="2"/>
    </g>
    <g transform="translate(38 308)">
      <circle cx="12" cy="12" r="12" fill="#FFFFFF"/>
      <rect x="44" y="0" width="326" height="24" rx="12" fill="#162231"/>
      <text x="58" y="17" fill="#CAD8E5" font-family="Inter, Arial, sans-serif" font-size="13">ActionClaim + ExecutionReceipt</text>
    </g>
  </g>
  <g transform="translate(812 526)">
    <rect width="122" height="34" rx="17" fill="#111A24" stroke="#263847"/>
    <text x="61" y="22" fill="#9BAAB8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">JSON events</text>
    <rect x="138" width="148" height="34" rx="17" fill="#111A24" stroke="#263847"/>
    <text x="212" y="22" fill="#9BAAB8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">BCS action proof</text>
    <rect x="302" width="118" height="34" rx="17" fill="#111A24" stroke="#263847"/>
    <text x="361" y="22" fill="#9BAAB8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Sui trace</text>
  </g>
</svg>
